{% extends "base.html" %}
{% block title %}Lịch sử - HTVC{% endblock %}

{% block content %}
<div class="section-title">Lịch sử dữ liệu cảm biến</div>

 

<div class="history-filters">
    <div class="filter-group">
        <label>Tầng</label>
        <select id="filterFloor">
            <option value="">Tất cả</option>
            <option value="1">Tầng 1</option>
            <option value="2">Tầng 2</option>
            <option value="3">Tầng 3</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Thời gian</label>
        <select id="filterTime">
            <option value="1">1 giờ gần nhất</option>
            <option value="6">6 giờ gần nhất</option>
            <option value="24" selected>24 giờ gần nhất</option>
            <option value="168">7 ngày gần nhất</option>
        </select>
    </div>
    <button class="btn btn-primary" onclick="loadHistory()"><span class="icon-mask icon-mask--xs icon-chart" aria-hidden="true"></span>Tải dữ liệu</button>
</div>

<div class="history-chart-container">
    <canvas id="historyChart"></canvas>
</div>

<div class="history-table-container">
    <table class="history-table">
        <thead>
            <tr>
                <th><span class="icon-mask icon-mask--xs icon-chart history-head-icon" aria-hidden="true"></span>Thời gian</th>
                <th><span class="icon-mask icon-mask--xs icon-leaf history-head-icon" aria-hidden="true"></span>Tầng</th>
                <th><span class="icon-mask icon-mask--xs icon-temp history-head-icon" aria-hidden="true"></span>Nhiệt độ</th>
                <th><span class="icon-mask icon-mask--xs icon-humidity history-head-icon" aria-hidden="true"></span>Độ ẩm</th>
                <th><span class="icon-mask icon-mask--xs icon-tds history-head-icon" aria-hidden="true"></span>TDS</th>
                <th><span class="icon-mask icon-mask--xs icon-device history-head-icon" aria-hidden="true"></span>pH</th>
                <th><span class="icon-mask icon-mask--xs icon-device history-head-icon" aria-hidden="true"></span>Trạng thái</th>
            </tr>
        </thead>
        <tbody id="historyTableBody">
            <tr>
                <td colspan="7" class="empty-state">Nhấn "Tải dữ liệu" để xem lịch sử</td>
            </tr>
        </tbody>
    </table>
</div>

{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
<style>
.history-filters {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 24px;
    flex-wrap: wrap;
}

.filter-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.filter-group label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
}

.filter-group select {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    color: var(--text);
    font-size: 0.875rem;
    min-width: 150px;
}

.history-chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    height: 350px;
}

.history-table-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
}

.history-table {
    width: 100%;
    border-collapse: collapse;
}

.history-table th,
.history-table td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
}

.history-table th {
    background: rgba(0, 212, 170, 0.05);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    white-space: nowrap;
}

.history-head-icon {
    margin-right: 6px;
    vertical-align: -2px;
}

.history-table td {
    font-size: 0.875rem;
    font-style: normal;
    writing-mode: horizontal-tb;
    text-orientation: mixed;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
}

.history-table td:first-child,
.history-table th:first-child {
    min-width: 90px;
}

.history-table tbody tr:hover {
    background: rgba(255, 255, 255, 0.02);
}

.history-table .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 32px;
}

.status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 500;
}

.status-online {
    background: rgba(34, 197, 94, 0.15);
    color: var(--success);
}

.status-offline {
    background: rgba(239, 68, 68, 0.15);
    color: var(--danger);
}

.history-chart-container canvas {
    filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.2));
}
</style>
{% endblock %}
