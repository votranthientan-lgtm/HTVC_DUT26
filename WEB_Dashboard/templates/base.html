<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}HTVC Dashboard{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Custom Styles -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/dashboard.css') }}"
    />

    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <div class="logo-icon">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
              >
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
              </svg>
            </div>
            <div>
              <h1>HTVC</h1>
              <p>Tủ Rau Thông Minh</p>
            </div>
          </div>

          <div class="header-actions">
            <div class="status" id="connectionStatus">
              <div class="status-main">
                <span class="pulse-dot"></span>
                <span id="statusText">Đã kết nối</span>
              </div>
              <span class="status-detail" id="statusDetail"
                >Cổng mặc định: 8883</span
              >
            </div>

            <button class="btn-icon" id="themeToggle" title="Đổi giao diện">
              <img
                id="themeIcon"
                src="{{ url_for('static', filename='images/darkmode.svg') }}"
                alt="Đổi giao diện"
                class="header-icon-img"
              />
            </button>

            <button class="btn-icon" id="firebaseBtn" title="Firebase Settings">
              <img
                src="{{ url_for('static', filename='images/users_config.svg') }}"
                alt="Firebase settings"
                class="header-icon-img"
              />
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Navigation -->
    <nav class="main-nav">
      <div class="container">
        <div class="nav-tabs">
          <a
            href="{{ url_for('dashboard.index') }}"
            class="nav-tab {% if active == 'dashboard' %}active{% endif %}"
          >
            <img
              src="{{ url_for('static', filename='images/dashboard.svg') }}"
              alt="Dashboard"
              class="nav-icon-img"
            />
            Dashboard
          </a>
          <a
            href="{{ url_for('dashboard.floors_page') }}"
            class="nav-tab {% if active == 'floors' %}active{% endif %}"
          >
            <img
              src="{{ url_for('static', filename='images/students.svg') }}"
              alt="Tầng"
              class="nav-icon-img"
            />
            Tầng
          </a>
          <a
            href="{{ url_for('dashboard.history_page') }}"
            class="nav-tab {% if active == 'history' %}active{% endif %}"
          >
            <img
              src="{{ url_for('static', filename='images/access_logs.svg') }}"
              alt="Lịch sử"
              class="nav-icon-img"
            />
            Lịch sử
          </a>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container">{% block content %}{% endblock %}</main>

    <!-- Firebase Settings Modal -->
    <div id="firebaseModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Firebase Settings</h3>
          <button class="modal-close" onclick="closeFirebaseSettings()">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Firebase Device ID</label>
            <input
              type="text"
              id="firebaseDeviceId"
              placeholder="htvc-floor1-001"
            />
          </div>
          <div class="form-group">
            <label>Firebase Token (optional)</label>
            <input
              type="password"
              id="firebaseToken"
              placeholder="Your Firebase auth token"
            />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeFirebaseSettings()">
            Đóng
          </button>
          <button class="btn btn-primary" onclick="saveFirebaseSettings()">
            Lưu
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/base.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
